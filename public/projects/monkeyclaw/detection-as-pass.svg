<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 318" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="440" height="318" fill="#ffffff"/>

  <text x="220" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">Detection-as-pass</text>

  <!-- axis labels -->
  <text x="267" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a">observability  →</text>
  <text x="22" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a" transform="rotate(-90 22 170)">prevention  →</text>

  <!-- column headers -->
  <text x="192" y="74" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2328">observed</text>
  <text x="342" y="74" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2328">silent / unknown</text>

  <!-- row headers -->
  <text x="58" y="130" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2328">blocked</text>
  <text x="58" y="220" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2328">succeeded</text>

  <!-- PASS -->
  <rect x="120" y="84" width="144" height="84" rx="8" fill="#2da44e"/>
  <text x="192" y="122" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">PASS</text>
  <text x="192" y="142" text-anchor="middle" font-size="9" fill="#eafbef">blocked + observed</text>

  <!-- WEAK -->
  <rect x="270" y="84" width="144" height="84" rx="8" fill="#d4a017"/>
  <text x="342" y="122" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">WEAK</text>
  <text x="342" y="142" text-anchor="middle" font-size="9" fill="#fdf6e3">blocked, but silent</text>

  <!-- PARTIAL -->
  <rect x="120" y="174" width="144" height="84" rx="8" fill="#db6d28"/>
  <text x="192" y="212" text-anchor="middle" font-size="17" font-weight="800" fill="#ffffff">PARTIAL</text>
  <text x="192" y="232" text-anchor="middle" font-size="9" fill="#fdeee3">succeeded, but observed</text>

  <!-- FAIL -->
  <rect x="270" y="174" width="144" height="84" rx="8" fill="#d64531"/>
  <text x="342" y="212" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">FAIL</text>
  <text x="342" y="232" text-anchor="middle" font-size="9" fill="#fdeae6">succeeded + silent</text>

  <text x="220" y="290" text-anchor="middle" font-size="9.5" fill="#57606a">A control passes only when the attack is blocked AND</text>
  <text x="220" y="305" text-anchor="middle" font-size="9.5" fill="#57606a">the runtime emitted telemetry. Blocked-but-silent is a latent regression.</text>
</svg>
