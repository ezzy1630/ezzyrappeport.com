<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" fill="url(#bg)" rx="16"/>

  <!-- Argus eye glyph -->
  <g transform="translate(140 130)">
    <ellipse cx="0" cy="0" rx="86" ry="52" fill="none" stroke="#334155" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="34" ry="34" fill="url(#iris)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="13" fill="#020617"/>
    <circle cx="-9" cy="-9" r="5" fill="#e2e8f0" opacity="0.9"/>
    <!-- surrounding hundred-eyed watchers, scaled to a few -->
    <circle cx="-70" cy="-44" r="6" fill="#a78bfa"/>
    <circle cx="70" cy="-44" r="6" fill="#f472b6"/>
    <circle cx="-86" cy="14" r="6" fill="#22d3ee"/>
    <circle cx="86" cy="14" r="6" fill="#facc15"/>
    <circle cx="-44" cy="46" r="6" fill="#7c3aed"/>
    <circle cx="44" cy="46" r="6" fill="#0ea5e9"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="118" fill="url(#word)" font-size="76" font-weight="800" letter-spacing="2">ARGYPH</text>
  <text x="272" y="158" fill="#94a3b8" font-size="20" font-weight="500">The local-first MCP server for serious codebases.</text>
  <text x="272" y="188" fill="#64748b" font-size="15">Zero config · zero cloud · full context.</text>

  <!-- pillar chips -->
  <g font-size="13" font-weight="600">
    <rect x="272" y="206" width="156" height="30" rx="15" fill="#0e2a3a"/>
    <text x="350" y="226" fill="#22d3ee" text-anchor="middle">symbol graph</text>
    <rect x="438" y="206" width="166" height="30" rx="15" fill="#221a3d"/>
    <text x="521" y="226" fill="#a78bfa" text-anchor="middle">semantic search</text>
    <rect x="614" y="206" width="138" height="30" rx="15" fill="#321526"/>
    <text x="683" y="226" fill="#f472b6" text-anchor="middle">repo packing</text>
  </g>
</svg>
